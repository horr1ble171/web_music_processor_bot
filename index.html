<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASCII Bot</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- Экран загрузки -->
        <div id="uploadScreen" class="screen active">
            <div class="empty-state">
                <div class="icon-box">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                </div>
                <h1>ASCII Генератор</h1>
                <p>Преврати фото в текстовый арт</p>
                <label for="fileInput" class="primary-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Выбрать фото
                </label>
            </div>
        </div>

        <!-- Экран редактора -->
        <div id="editorScreen" class="screen">
            <!-- Верхняя панель -->
            <header class="top-bar">
                <button id="resetBtn" class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><arrow-left x="19" y="12" x2="5" y2="12"></arrow-left><polyline points="12 19 5 12 12 5"></polyline><line x1="19" y1="12" x2="5" y2="12"></line></svg>
                </button>
                <span class="title">Редактор</span>
                <div style="width: 40px;"></div> <!-- Пустой блок для центрирования -->
            </header>

            <!-- Область просмотра -->
            <div class="canvas-wrapper">
                <canvas id="asciiCanvas"></canvas>
            </div>

            <!-- Нижняя панель настроек -->
            <div class="bottom-panel" id="bottomPanel">
                <!-- Ручка для сворачивания -->
                <div id="panelToggle" class="panel-handle">
                    <div class="handle-bar"></div>
                </div>

                <!-- Слайдер качества -->
                <div class="control-row">
                    <div class="row-header">
                        <span class="label">Детализация</span>
                        <span class="value" id="widthVal">100</span>
                    </div>
                    <input type="range" id="widthRange" min="20" max="150" step="5" value="100">
                </div>

                <!-- Набор символов -->
                <div class="control-row">
                    <span class="label">Символы</span>
                    <div class="segmented-control" id="charSetTabs">
                        <button class="segment active" data-val="simple">Простой</button>
                        <button class="segment" data-val="detailed">Детальный</button>
                        <button class="segment" data-val="blocks">Блоки</button>
                    </div>
                </div>

                <!-- Цвета -->
                <div class="control-row">
                    <span class="label">Цвет</span>
                    <div class="color-scroll">
                        <button class="color-item original" id="btnOriginal">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                            Оригинал
                        </button>
                        <div class="color-item custom">
                            <input type="color" id="customColorInput" value="#ffffff">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </div>
                        <div id="presetColors" class="preset-list">
                            <!-- JS заполнит это -->
                        </div>
                    </div>
                </div>

                <!-- Кнопка скачивания -->
                <div class="download-section">
                    <button id="downloadBtnBottom" class="primary-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Скачать результат
                    </button>
                    <button id="sendToBotBtn" class="primary-btn" style="background-color: #007aff; color: white; display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        Отправить в бота
                    </button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display: none;">
    <script src="script.js"></script>
</body>
</html>
